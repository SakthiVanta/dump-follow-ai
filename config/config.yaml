robot:
  name: "TinyAIRobot"
  version: "1.0.0"
  log_level: "INFO"

vision:
  model_path: "models/yolov8n.pt"
  conf_threshold: 0.5
  iou_threshold: 0.45
  target_class: "person"
  frame_width: 320
  frame_height: 240
  camera_id: 0
  fps_target: 30
  tracker: "bytetrack"           # bytetrack | deepsort | none

control:
  base_speed: 100
  max_speed: 200
  min_speed: -200
  pid:
    kp: 0.4
    ki: 0.01
    kd: 0.1
    integral_limit: 500
    output_limit: 150
  safe_distance_ratio: 0.35     # bbox height / frame height — stop if closer
  search_turn_speed: 50         # speed when rotating to find target
  lost_target_timeout_s: 2.0   # seconds before entering search mode

motor:
  invert_left: false
  invert_right: false
  pwm_frequency: 1000

serial:
  port: "/dev/ttyUSB0"
  baudrate: 115200
  timeout_s: 1.0
  mock: false                    # true = log commands instead of sending

voice:
  enabled: true
  engine: "google"               # google | whisper
  whisper_model: "base"
  language: "en-US"
  energy_threshold: 300
  phrase_time_limit_s: 5

api:
  host: "0.0.0.0"
  port: 8000
  reload: false
  cors_origins:
    - "http://localhost:3000"
    - "http://localhost:8080"

training:
  data_dir: "data"
  model_base: "yolov8n.pt"
  epochs: 100
  batch_size: 16
  image_size: 640
  output_dir: "models/trained"
  augment: true

motion_model:
  enabled: false
  model_path: "models/svsp.pt"
  sequence_length: 8
  train_samples: 2000
  epochs: 120
  learning_rate: 0.15
  synthetic_noise: 0.03

# ── Active Learning ──────────────────────────────────────────────────────────
# Frames with confidence < threshold go to the review queue at localhost:8000/review
# Human confirms labels → auto-retrains the Tiny NN after `retrain_threshold` new labels
active_learning:
  enabled: true
  db_path: "data/labels.db"
  frames_dir: "data/review_frames"
  model_path: "models/tiny_nn.pkl"
  confidence_threshold: 0.6    # below this → show in review UI
  sample_rate: 0.3             # save 30% of high-confidence frames (tune down after enough data)
  retrain_threshold: 20        # retrain after this many new confirmed labels
  retrain_epochs: 300
  cooldown_s: 0.5              # min seconds between saves (avoid flood)
  patch_size: 64               # saved patch size in pixels

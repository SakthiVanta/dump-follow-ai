name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0 portaudio19-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check robot/ training/ tests/

      - name: Type check with mypy
        run: mypy robot/ --ignore-missing-imports
        continue-on-error: true

      - name: Run tests
        env:
          MOCK_SERIAL: "true"
          MOCK_CAMERA: "true"
        run: |
          pytest tests/ \
            --cov=robot \
            --cov=training \
            --cov-report=xml \
            --cov-report=term-missing \
            -v

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t tiny-ai-robot:latest .

      - name: Smoke test container
        run: |
          docker run -d --name robot-test -p 8000:8000 \
            -e MOCK_SERIAL=true tiny-ai-robot:latest
          sleep 5
          curl -f http://localhost:8000/api/v1/health
          docker stop robot-test
